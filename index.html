<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Pod Booking System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Glass Cards */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root"></div>

    <!-- React & Firebase Scripts -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc, doc, Timestamp, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseModules = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc, doc, Timestamp, where
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIG ---
        // DATA INI SUDAH DIPERBAIKI SESUAI SCREENSHOT & KODE LAMA ANDA
        const DEFAULT_CONFIG = {
            apiKey: "AIzaSyDHgDZwO4vLyNpHmnM9H1VhZ4uNefAsrAU", 
            authDomain: "phd-pod-booking.firebaseapp.com",
            projectId: "phd-pod-booking",
            storageBucket: "phd-pod-booking.firebasestorage.app",
            messagingSenderId: "694202367643",
            appId: "1:694202367643:web:79e03eb8978470cdf0d03e" 
        };

        // --- MAIN APP ---
        function App() {
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [appId, setAppId] = useState(() => typeof window.__app_id !== 'undefined' ? window.__app_id : 'phd-pod-v3');

            const [view, setView] = useState('booking'); // 'booking', 'schedule', 'admin'
            const [bookings, setBookings] = useState([]);
            const [loading, setLoading] = useState(true);
            const [notification, setNotification] = useState(null);

            // Admin Logic
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPass, setAdminPass] = useState('');
            const [clickCount, setClickCount] = useState(0);

            // Initialize Firebase
            useEffect(() => {
                const init = async () => {
                    if (!window.firebaseModules) return;
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.firebaseModules;
                    
                    const config = window.__firebase_config ? JSON.parse(window.__firebase_config) : DEFAULT_CONFIG;
                    
                    try {
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        setDb(db);

                        if (window.__initial_auth_token) await signInWithCustomToken(auth, window.__initial_auth_token);
                        else await signInAnonymously(auth);
                        
                        onAuthStateChanged(auth, u => u && setUser(u));
                    } catch (e) { console.error(e); notify("Connection Failed", "error"); }
                };
                window.firebaseModules ? init() : window.addEventListener('firebase-ready', init);
            }, []);

            // Data Fetching
            useEffect(() => {
                if (!user || !db) return;
                const { collection, query, onSnapshot } = window.firebaseModules;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'bookings'));
                
                return onSnapshot(q, snap => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                        .sort((a,b) => a.startTime.seconds - b.startTime.seconds);
                    setBookings(data);
                    setLoading(false);
                }, err => notify("Failed to load data", "error"));
            }, [user, db, appId]);

            // Admin Shortcut
            useEffect(() => {
                let buffer = '';
                const handler = e => {
                    buffer = (buffer + e.key).slice(-5).toLowerCase();
                    if (buffer === 'admin') setShowAdminLogin(true);
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, []);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3500);
            };

            const checkOverlap = (start, end, excludeId = null) => {
                return bookings.some(b => {
                    if (excludeId && b.id === excludeId) return false;
                    const bStart = b.startTime.toDate();
                    const bEnd = b.endTime.toDate();
                    return (start < bEnd && end > bStart);
                });
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-slate-50"><div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white md:bg-slate-50 shadow-2xl relative flex flex-col md:max-w-xl lg:max-w-2xl border-x border-slate-200">
                    
                    {/* Header */}
                    <header className="glass-header sticky top-0 z-40 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                <i className="fas fa-cube text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-slate-800 leading-tight">PhD Pod</h1>
                                <p className="text-[10px] font-bold text-indigo-500 tracking-wider uppercase">Booking System</p>
                            </div>
                        </div>
                        <div className="flex gap-2 bg-slate-100 p-1 rounded-lg">
                            <TabIcon active={view==='booking'} icon="fa-plus" onClick={()=>setView('booking')} />
                            <TabIcon active={view==='schedule'} icon="fa-calendar-days" onClick={()=>setView('schedule')} />
                            {isAdmin && <TabIcon active={view==='admin'} icon="fa-chart-pie" color="text-indigo-600" onClick={()=>setView('admin')} />}
                        </div>
                    </header>

                    {/* Notification */}
                    {notification && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 animate-slide">
                            <div className={`flex items-center gap-3 px-5 py-3 rounded-full shadow-xl border ${notification.type==='error' ? 'bg-red-50 border-red-100 text-red-600' : 'bg-emerald-50 border-emerald-100 text-emerald-600'}`}>
                                <i className={`fas ${notification.type==='error' ? 'fa-circle-xmark' : 'fa-circle-check'}`}></i>
                                <span className="text-sm font-semibold">{notification.msg}</span>
                            </div>
                        </div>
                    )}

                    {/* Main Content */}
                    <main className="flex-1 p-5 space-y-6 overflow-y-auto">
                        {view === 'booking' && (
                            <BookingForm db={db} appId={appId} notify={notify} checkOverlap={checkOverlap} setView={setView} />
                        )}
                        {view === 'schedule' && (
                            <ScheduleView bookings={bookings} db={db} appId={appId} notify={notify} checkOverlap={checkOverlap} />
                        )}
                        {view === 'admin' && isAdmin && (
                            <AdminAnalytics bookings={bookings} db={db} appId={appId} notify={notify} />
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="py-6 text-center text-slate-300 text-xs">
                        <span onClick={() => {
                            setClickCount(p => p+1);
                            if(clickCount >= 4) { setShowAdminLogin(true); setClickCount(0); }
                        }} className="cursor-pointer hover:text-indigo-400 transition">
                            System v3.0 &copy; 2026
                        </span>
                    </footer>

                    {/* Admin Modal */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm animate-slide">
                                <h3 className="font-bold text-lg mb-4 text-slate-800">Super User Access</h3>
                                <form onSubmit={e => {
                                    e.preventDefault();
                                    if(adminPass === 'admin') { setIsAdmin(true); setShowAdminLogin(false); setView('admin'); notify("Welcome Admin!"); }
                                    else notify("Access Denied", "error");
                                }}>
                                    <input type="password" autoFocus placeholder="Password" value={adminPass} onChange={e=>setAdminPass(e.target.value)} className="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-indigo-500"/>
                                    <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Login</button>
                                </form>
                                <button onClick={()=>setShowAdminLogin(false)} className="mt-3 w-full text-slate-400 text-sm">Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- COMPONENTS ---

        function TabIcon({ active, icon, onClick, color }) {
            return (
                <button onClick={onClick} className={`w-10 h-10 rounded-md flex items-center justify-center transition-all ${active ? 'bg-white shadow-sm text-indigo-600 ring-1 ring-slate-200' : 'text-slate-400 hover:text-slate-600'} ${color && active ? color : ''}`}>
                    <i className={`fas ${icon}`}></i>
                </button>
            );
        }

        function BookingForm({ db, appId, notify, checkOverlap, setView }) {
            const [data, setData] = useState({ name: '', email: '', id: '', date: '', time: '', dur: '1', purp: '', pax: 1, pin: '' });
            const [loading, setLoading] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);

            const submit = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { Timestamp, collection, addDoc } = window.firebaseModules;

                // --- VALIDATION LAYER ---
                // 1. Name Length
                if (data.name.trim().length < 3) {
                    notify("Name must be at least 3 characters", "error"); setLoading(false); return;
                }

                // 2. Student ID Exact 8 Digits
                if (!/^\d{8}$/.test(data.id)) {
                    notify("Student ID must be exactly 8 digits", "error"); setLoading(false); return;
                }

                // 3. PIN Length
                if (!/^\d{4}$/.test(data.pin)) {
                    notify("PIN must be 4 digits", "error"); setLoading(false); return;
                }

                // 4. Time Validation (Anti-Backdate)
                const start = new Date(`${data.date}T${data.time}`);
                const now = new Date();
                
                if (start < now) {
                    notify("Cannot book in the past!", "error"); setLoading(false); return;
                }

                const end = new Date(start.getTime() + (data.dur * 3600000));

                if(checkOverlap(start, end)) { 
                    notify("Slot unavailable (Overlap)", "error"); setLoading(false); return; 
                }

                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'bookings'), {
                        name: data.name, email: data.email.toLowerCase(), studentId: data.id,
                        startTime: Timestamp.fromDate(start), endTime: Timestamp.fromDate(end),
                        duration: data.dur, purpose: data.purp, pax: data.pax, pin: data.pin,
                        createdAt: Timestamp.now()
                    });
                    setShowSuccess(true);
                } catch(e) { notify("Error saving booking", "error"); }
                setLoading(false);
            };

            const closeSuccess = () => { setShowSuccess(false); setView('schedule'); };
            const today = new Date().toISOString().split('T')[0];

            return (
                <div className="animate-slide">
                    {showSuccess && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6 animate-slide">
                            <div className="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm text-center relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-400 to-cyan-500"></div>
                                <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-500 text-3xl mx-auto mb-4">
                                    <i className="fas fa-check"></i>
                                </div>
                                <h3 className="text-2xl font-bold text-slate-800 mb-2">Booking Confirmed!</h3>
                                <p className="text-slate-500 text-sm mb-6">Your slot has been secured.</p>
                                <button onClick={closeSuccess} className="w-full py-3 bg-slate-900 text-white rounded-xl font-bold shadow-lg hover:bg-slate-800 transition">Awesome</button>
                            </div>
                        </div>
                    )}

                    <div className="mb-6">
                        <h2 className="text-2xl font-bold text-slate-800">New Booking</h2>
                        <p className="text-slate-500 text-sm">Fill in details to reserve.</p>
                    </div>

                    <form onSubmit={submit} className="space-y-4">
                        <div className="glass-panel p-5 rounded-2xl space-y-4">
                            <Input label="Full Name (Min 3 chars)" icon="fa-user">
                                <input required className="w-full bg-transparent outline-none text-sm font-medium placeholder-slate-400" placeholder="e.g. Sarah Owen" value={data.name} onChange={e=>setData({...data, name:e.target.value})} />
                            </Input>
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Email" icon="fa-envelope">
                                    <input required type="email" className="w-full bg-transparent outline-none text-sm font-medium placeholder-slate-400" placeholder="sarah.owen@uni.edu" value={data.email} onChange={e=>setData({...data, email:e.target.value})} />
                                </Input>
                                <Input label="Student ID (8 Digits)" icon="fa-id-card">
                                    <input required inputMode="numeric" maxLength="8" className="w-full bg-transparent outline-none text-sm font-medium placeholder-slate-400" placeholder="12345678" value={data.id} onChange={e=>setData({...data, id:e.target.value.replace(/\D/g, '')})} />
                                </Input>
                            </div>
                        </div>

                        <div className="glass-panel p-5 rounded-2xl space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Date" icon="fa-calendar">
                                    <input required type="date" min={today} className="w-full bg-transparent outline-none text-sm font-bold text-slate-700" value={data.date} onChange={e=>setData({...data, date:e.target.value})} />
                                </Input>
                                <Input label="Time" icon="fa-clock">
                                    <input required type="time" className="w-full bg-transparent outline-none text-sm font-bold text-slate-700" value={data.time} onChange={e=>setData({...data, time:e.target.value})} />
                                </Input>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Duration" icon="fa-hourglass">
                                    <select className="w-full bg-transparent outline-none text-sm font-bold text-slate-700" value={data.dur} onChange={e=>setData({...data, dur:e.target.value})}>
                                        {[0.5, 1, 1.5, 2, 3, 4].map(h => <option key={h} value={h}>{h} Hour{h>1?'s':''}</option>)}
                                    </select>
                                </Input>
                                <Input label="Group Size" icon="fa-users">
                                    <input required type="number" min="1" max="8" className="w-full bg-transparent outline-none text-sm font-bold text-slate-700" value={data.pax} onChange={e=>setData({...data, pax:e.target.value})} />
                                </Input>
                            </div>
                        </div>

                        <div className="glass-panel p-5 rounded-2xl space-y-4">
                            <Input label="Purpose" icon="fa-comment-alt">
                                <textarea required rows="2" className="w-full bg-transparent outline-none text-sm font-medium placeholder-slate-400 resize-none" placeholder="e.g. Zoom meeting, Thesis defense prep..." value={data.purp} onChange={e=>setData({...data, purp:e.target.value})}></textarea>
                            </Input>
                            <div className="bg-indigo-50 border border-indigo-100 p-3 rounded-xl flex items-center gap-3">
                                <div className="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-indigo-500 shadow-sm shrink-0">
                                    <i className="fas fa-lock"></i>
                                </div>
                                <div className="flex-1">
                                    <label className="text-xs font-bold text-indigo-900 uppercase">Set Booking PIN</label>
                                    <input required type="text" maxLength="4" inputMode="numeric" placeholder="0000" className="w-full bg-transparent border-b border-indigo-200 outline-none text-lg font-bold tracking-[0.5em] text-indigo-700 focus:border-indigo-500 placeholder-indigo-200" value={data.pin} onChange={e=>setData({...data, pin:e.target.value.replace(/\D/g, '')})} />
                                </div>
                            </div>
                        </div>

                        <button disabled={loading} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 transition active:scale-[0.98]">
                            {loading ? <i className="fas fa-circle-notch animate-spin"></i> : 'Confirm Booking'}
                        </button>
                    </form>
                </div>
            );
        }

        function ScheduleView({ bookings, db, appId, notify, checkOverlap }) {
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const filtered = bookings.filter(b => b.startTime.toDate().toISOString().startsWith(date));

            return (
                <div className="animate-slide space-y-4">
                    <div className="glass-panel p-4 rounded-2xl flex items-center gap-4">
                        <div className="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 text-xl shadow-inner">
                            <i className="fas fa-calendar-check"></i>
                        </div>
                        <div className="flex-1">
                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Select Date</label>
                            <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full bg-transparent font-bold text-lg text-slate-800 outline-none" />
                        </div>
                    </div>

                    <div className="space-y-4 relative pl-4 border-l-2 border-slate-200 ml-4 pb-4">
                        {filtered.length === 0 ? (
                            <div className="bg-white/50 p-6 rounded-2xl border border-dashed border-slate-300 text-center text-slate-400 ml-4">
                                No bookings for this day.
                            </div>
                        ) : (
                            filtered.map(b => (
                                <ScheduleItem key={b.id} booking={b} db={db} appId={appId} notify={notify} checkOverlap={checkOverlap} />
                            ))
                        )}
                    </div>
                </div>
            );
        }

        function ScheduleItem({ booking, db, appId, notify, checkOverlap }) {
            const [mode, setMode] = useState('view');
            const [pin, setPin] = useState('');
            const [editData, setEditData] = useState({ date: '', time: '', dur: '' });
            const [confirmDelete, setConfirmDelete] = useState(false);

            useEffect(() => {
                if(booking) {
                    const d = booking.startTime.toDate();
                    setEditData({
                        date: d.toISOString().split('T')[0],
                        time: d.toLocaleTimeString([], {hourCycle:'h23', hour:'2-digit', minute:'2-digit'}),
                        dur: booking.duration
                    });
                }
            }, [booking]);

            const handleUpdate = async () => {
                const start = new Date(`${editData.date}T${editData.time}`);
                // Validate backdate on edit too
                if (start < new Date()) { notify("Cannot move to past!", "error"); return; }

                const end = new Date(start.getTime() + (editData.dur * 3600000));
                if(checkOverlap(start, end, booking.id)) { notify("Slot overlap!", "error"); return; }
                
                try {
                    const { updateDoc, doc, Timestamp } = window.firebaseModules;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bookings', booking.id), {
                        startTime: Timestamp.fromDate(start), endTime: Timestamp.fromDate(end), duration: editData.dur
                    });
                    notify("Updated!"); setMode('view'); setPin('');
                } catch(e) { notify("Error", "error"); }
            };

            const handleDelete = async () => {
                if (!confirmDelete) { setConfirmDelete(true); setTimeout(() => setConfirmDelete(false), 3000); return; }
                try {
                    const { deleteDoc, doc } = window.firebaseModules;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bookings', booking.id));
                    notify("Cancelled");
                } catch(e) { notify("Error", "error"); }
            };

            return (
                <div className="relative ml-4">
                    <div className="absolute -left-[29px] top-4 w-5 h-5 bg-white border-4 border-indigo-400 rounded-full z-10"></div>
                    <div className={`glass-panel p-4 rounded-2xl transition-all ${mode !== 'view' ? 'ring-2 ring-indigo-400 bg-white' : 'hover:scale-[1.01]'}`}>
                        {mode === 'view' && (
                            <div className="flex justify-between items-start">
                                <div>
                                    <div className="font-bold text-slate-800 text-lg">
                                        {booking.startTime.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                                    </div>
                                    <div className="text-xs font-bold text-indigo-500 uppercase tracking-wide mb-1">
                                        To {booking.endTime.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                                    </div>
                                    <div className="text-sm text-slate-600 flex items-center gap-2 mb-1">
                                        <i className="fas fa-user text-slate-300 text-xs"></i> {booking.name}
                                    </div>
                                </div>
                                <button onClick={()=>setMode('unlock')} className="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg hover:bg-indigo-100">Manage</button>
                            </div>
                        )}
                        {mode === 'unlock' && (
                            <form onSubmit={(e)=>{e.preventDefault(); if(pin===booking.pin) setMode('edit'); else {notify("Wrong PIN", "error"); setPin('')}}} className="flex gap-2">
                                <input autoFocus type="password" maxLength="4" className="w-20 border rounded-lg p-2 text-center text-sm font-bold outline-none ring-1 ring-indigo-200" value={pin} onChange={e=>setPin(e.target.value)} placeholder="PIN" />
                                <button className="bg-indigo-600 text-white px-3 rounded-lg text-xs font-bold">Unlock</button>
                                <button type="button" onClick={()=>{setMode('view'); setPin('')}} className="text-xs text-slate-400 px-2">Cancel</button>
                            </form>
                        )}
                        {mode === 'edit' && (
                            <div className="space-y-3 animate-slide">
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="date" className="bg-slate-50 border rounded-lg p-2 text-xs font-bold" value={editData.date} onChange={e=>setEditData({...editData, date:e.target.value})} />
                                    <input type="time" className="bg-slate-50 border rounded-lg p-2 text-xs font-bold" value={editData.time} onChange={e=>setEditData({...editData, time:e.target.value})} />
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleUpdate} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-xs font-bold">Save</button>
                                    <button onClick={handleDelete} className={`flex-1 border py-2 rounded-lg text-xs font-bold ${confirmDelete?'bg-red-500 text-white border-red-500':'text-red-500 border-red-200'}`}>{confirmDelete?'Confirm?':'Cancel Booking'}</button>
                                    <button onClick={()=>setMode('view')} className="px-3 text-slate-400 text-xs">Back</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- ADMIN ANALYTICS & DATA ---
        function AdminAnalytics({ bookings, db, appId, notify }) {
            const [tab, setTab] = useState('stats'); // 'stats' or 'list'

            // --- Download Logic ---
            const downloadCSV = () => {
                const headers = ["ID,Name,Email,Student ID,Date,Start Time,End Time,Duration,Purpose,Created At"];
                const rows = bookings.map(b => {
                    const start = b.startTime.toDate();
                    const end = b.endTime.toDate();
                    const created = b.createdAt ? b.createdAt.toDate().toISOString() : '-';
                    return [
                        b.id, `"${b.name}"`, b.email, b.studentId,
                        start.toLocaleDateString(), start.toLocaleTimeString(), end.toLocaleTimeString(),
                        b.duration, `"${b.purpose}"`, created
                    ].join(",");
                });
                const csvContent = "data:text/csv;charset=utf-8," + [headers, ...rows].join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `phd_pod_bookings_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
            };

            // --- Analytics Calculation ---
            const totalBookings = bookings.length;
            const uniqueUsers = new Set(bookings.map(b => b.studentId)).size;
            const totalHours = bookings.reduce((sum, b) => sum + parseFloat(b.duration), 0);
            
            // Calc busy hours
            const hourCounts = {};
            bookings.forEach(b => {
                const h = b.startTime.toDate().getHours();
                hourCounts[h] = (hourCounts[h] || 0) + 1;
            });
            const busyHour = Object.keys(hourCounts).sort((a,b) => hourCounts[b] - hourCounts[a])[0];

            // Delete function
            const del = async (id) => {
                if(confirm("Admin: Delete this?")) {
                    const { deleteDoc, doc } = window.firebaseModules;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bookings', id));
                    notify("Deleted");
                }
            };

            return (
                <div className="space-y-6 animate-slide">
                    <div className="flex justify-between items-center">
                        <h2 className="text-xl font-bold text-slate-800">Admin Dashboard</h2>
                        <button onClick={downloadCSV} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow hover:bg-emerald-700 flex items-center gap-2">
                            <i className="fas fa-file-csv"></i> Download Data
                        </button>
                    </div>

                    {/* Stats Cards */}
                    <div className="grid grid-cols-2 gap-3">
                        <StatCard label="Total Bookings" value={totalBookings} icon="fa-list" color="text-blue-600" bg="bg-blue-50" />
                        <StatCard label="Unique Students" value={uniqueUsers} icon="fa-users" color="text-purple-600" bg="bg-purple-50" />
                        <StatCard label="Total Hours Used" value={totalHours + 'h'} icon="fa-clock" color="text-amber-600" bg="bg-amber-50" />
                        <StatCard label="Peak Hour" value={busyHour ? `${busyHour}:00` : '-'} icon="fa-fire" color="text-red-600" bg="bg-red-50" />
                    </div>

                    {/* Tabs */}
                    <div className="flex border-b border-slate-200">
                        <button onClick={()=>setTab('stats')} className={`flex-1 py-2 text-sm font-bold ${tab==='stats'?'text-indigo-600 border-b-2 border-indigo-600':'text-slate-400'}`}>User List</button>
                    </div>

                    {/* Simple List View */}
                    <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm text-slate-600">
                                <thead className="bg-slate-50 text-xs uppercase font-bold text-slate-400">
                                    <tr>
                                        <th className="p-3">Name/ID</th>
                                        <th className="p-3">Date</th>
                                        <th className="p-3">Action</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {bookings.map(b => (
                                        <tr key={b.id} className="hover:bg-slate-50">
                                            <td className="p-3">
                                                <div className="font-bold text-slate-800">{b.name}</div>
                                                <div className="text-xs">{b.studentId}</div>
                                            </td>
                                            <td className="p-3 whitespace-nowrap">
                                                {b.startTime.toDate().toLocaleDateString()}
                                                <div className="text-xs text-indigo-500 font-bold">{b.startTime.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                                            </td>
                                            <td className="p-3">
                                                <button onClick={()=>del(b.id)} className="text-red-400 hover:text-red-600"><i className="fas fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function StatCard({ label, value, icon, color, bg }) {
            return (
                <div className={`p-4 rounded-2xl ${bg} border border-white/50 shadow-sm flex flex-col justify-center items-center text-center`}>
                    <i className={`fas ${icon} ${color} text-xl mb-2`}></i>
                    <div className="text-2xl font-bold text-slate-800">{value}</div>
                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{label}</div>
                </div>
            );
        }

        function Input({ label, icon, children }) {
            return (
                <div className="relative group">
                    <div className="absolute top-3 left-3 text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                        <i className={`fas ${icon}`}></i>
                    </div>
                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-2 pl-10 focus-within:bg-white focus-within:border-indigo-500 focus-within:ring-4 focus-within:ring-indigo-500/10 transition-all">
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">{label}</label>
                        {children}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
