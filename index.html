<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Pod Booking System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f8;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
            background-attachment: fixed;
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Glass Cards */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-enter {
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; /* Initial state hidden */
        }
        
        .btn-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover:active {
            transform: scale(0.96);
        }

        .bar-grow { transition: height 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="min-h-screen selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root"></div>

    <!-- React & Firebase Scripts -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc, doc, Timestamp, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseModules = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc, doc, Timestamp, where
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIG ---
        const DEFAULT_CONFIG = {
            apiKey: "AIzaSyDHgDZwO4vLyNpHmnM9H1VhZ4uNefAsrAU",
            authDomain: "phd-pod-booking.firebaseapp.com",
            projectId: "phd-pod-booking",
            storageBucket: "phd-pod-booking.firebasestorage.app",
            messagingSenderId: "694202367643",
            appId: "1:694202367643:web:79e03eb8978470cdf0d03e"
        };

        // --- MAIN APP ---
        function App() {
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            // Tetap menggunakan 'phd-pod-v2' agar data lama aman
            const [appId, setAppId] = useState(() => typeof window.__app_id !== 'undefined' ? window.__app_id : 'phd-pod-v2');

            const [view, setView] = useState('booking'); 
            const [bookings, setBookings] = useState([]);
            const [loading, setLoading] = useState(true);
            const [notification, setNotification] = useState(null);

            // Admin Logic
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPass, setAdminPass] = useState('');
            const [clickCount, setClickCount] = useState(0);

            // Initialize Firebase
            useEffect(() => {
                const init = async () => {
                    if (!window.firebaseModules) return;
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.firebaseModules;
                    
                    let config;
                    let isPreview = false;
                    if (typeof window.__firebase_config !== 'undefined') {
                        config = JSON.parse(window.__firebase_config);
                        isPreview = true;
                    } else {
                        config = DEFAULT_CONFIG;
                    }
                    
                    try {
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        setDb(db);

                        if (isPreview && window.__initial_auth_token) {
                            await signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        
                        onAuthStateChanged(auth, u => u && setUser(u));
                    } catch (e) { 
                        console.error(e); 
                        notify("Init Error: " + e.message, "error"); 
                        setLoading(false);
                    }
                };
                window.firebaseModules ? init() : window.addEventListener('firebase-ready', init);
                
                const timer = setTimeout(() => {
                    setLoading(prev => {
                        if(prev) {
                            notify("Connection slow.", "error");
                            return false;
                        }
                        return prev;
                    });
                }, 8000);
                return () => clearTimeout(timer);
            }, []);

            // Data Fetching
            useEffect(() => {
                if (!user || !db) return;
                const { collection, query, onSnapshot } = window.firebaseModules;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'bookings'));
                
                return onSnapshot(q, snap => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                        .sort((a,b) => a.startTime.seconds - b.startTime.seconds);
                    setBookings(data);
                    setLoading(false);
                }, err => {
                    console.error("Fetch error:", err);
                    setLoading(false);
                });
            }, [user, db, appId]);

            // Admin Shortcut
            useEffect(() => {
                let buffer = '';
                const handler = e => {
                    buffer = (buffer + e.key).slice(-5).toLowerCase();
                    if (buffer === 'admin') setShowAdminLogin(true);
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, []);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 5000);
            };

            const checkOverlap = (start, end, excludeId = null) => {
                return bookings.some(b => {
                    if (excludeId && b.id === excludeId) return false;
                    const bStart = b.startTime.toDate();
                    const bEnd = b.endTime.toDate();
                    return (start < bEnd && end > bStart);
                });
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 gap-4">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-sm text-slate-500 animate-pulse font-medium tracking-wide">Connecting to PhD Pod...</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white md:bg-slate-50 shadow-2xl relative flex flex-col md:max-w-xl lg:max-w-2xl border-x border-slate-200">
                    
                    {/* Header */}
                    <header className="glass-header sticky top-0 z-40 px-6 py-4 flex justify-between items-center transition-all duration-300">
                        <div className="flex items-center gap-3 group cursor-default">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200 group-hover:rotate-12 transition-transform duration-300">
                                <i className="fas fa-cube text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-extrabold text-slate-800 leading-tight tracking-tight">PhD Pod</h1>
                                <p className="text-[10px] font-bold text-indigo-500 tracking-wider uppercase">Booking System</p>
                            </div>
                        </div>
                        <div className="flex gap-2 bg-slate-100 p-1.5 rounded-xl">
                            <TabIcon active={view==='booking'} icon="fa-plus" onClick={()=>setView('booking')} />
                            <TabIcon active={view==='schedule'} icon="fa-calendar-days" onClick={()=>setView('schedule')} />
                            {isAdmin && <TabIcon active={view==='admin'} icon="fa-chart-pie" color="text-indigo-600" onClick={()=>setView('admin')} />}
                        </div>
                    </header>

                    {/* Notification */}
                    {notification && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[200] animate-enter w-full max-w-sm px-4">
                            <div className={`flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-xl border backdrop-blur-md ${notification.type==='error' ? 'bg-red-50/90 border-red-100 text-red-600' : 'bg-emerald-50/90 border-emerald-100 text-emerald-600'}`}>
                                <i className={`fas ${notification.type==='error' ? 'fa-circle-xmark' : 'fa-circle-check'} text-lg`}></i>
                                <span className="text-sm font-bold truncate">{notification.msg}</span>
                            </div>
                        </div>
                    )}

                    {/* Main Content */}
                    <main className="flex-1 p-5 space-y-6 overflow-y-auto custom-scrollbar">
                        {view === 'booking' && (
                            <div className="animate-enter" style={{animationDelay: '0ms'}}>
                                <BookingForm db={db} appId={appId} notify={notify} checkOverlap={checkOverlap} setView={setView} />
                            </div>
                        )}
                        {view === 'schedule' && (
                            <div className="animate-enter" style={{animationDelay: '0ms'}}>
                                <ScheduleView bookings={bookings} db={db} appId={appId} notify={notify} checkOverlap={checkOverlap} />
                            </div>
                        )}
                        {view === 'admin' && isAdmin && (
                            <div className="animate-enter" style={{animationDelay: '0ms'}}>
                                <AdminAnalytics bookings={bookings} db={db} appId={appId} notify={notify} />
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="py-6 text-center text-slate-400 text-xs font-medium">
                        <span onClick={() => {
                            setClickCount(p => p+1);
                            if(clickCount >= 4) { setShowAdminLogin(true); setClickCount(0); }
                        }} className="cursor-pointer hover:text-indigo-500 transition duration-300">
                            System v4.5 &copy; 2026
                        </span>
                    </footer>

                    {/* Admin Modal */}
                    {showAdminLogin && (
                        <Modal title="Admin Access" onClose={()=>setShowAdminLogin(false)}>
                            <form onSubmit={e => {
                                e.preventDefault();
                                if(adminPass === 'MGROadm1n') { setIsAdmin(true); setShowAdminLogin(false); setView('admin'); notify("Welcome Admin!"); }
                                else notify("Access Denied", "error");
                            }}>
                                <input type="password" autoFocus placeholder="Password" value={adminPass} onChange={e=>setAdminPass(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-mono"/>
                                <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:shadow-indigo-300 hover:bg-indigo-700 btn-hover">Login</button>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        }

        // --- COMPONENTS ---

        function TabIcon({ active, icon, onClick, color }) {
            return (
                <button onClick={onClick} className={`w-10 h-10 rounded-lg flex items-center justify-center transition-all duration-300 ${active ? 'bg-white shadow-sm text-indigo-600 ring-1 ring-slate-200 scale-105' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'} ${color && active ? color : ''}`}>
                    <i className={`fas ${icon}`}></i>
                </button>
            );
        }

        // --- MODAL COMPONENT (Reusable) ---
        function Modal({ title, onClose, children, color="indigo" }) {
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6 animate-enter">
                    <div className="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-sm relative overflow-hidden transform transition-all">
                        <div className={`absolute top-0 left-0 w-full h-1.5 bg-${color}-500`}></div>
                        <div className="flex justify-between items-center mb-6 mt-2">
                            <h3 className="text-xl font-bold text-slate-800 tracking-tight">{title}</h3>
                            <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center bg-slate-50 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition"><i className="fas fa-times"></i></button>
                        </div>
                        {children}
                    </div>
                </div>
            );
        }

        function BookingForm({ db, appId, notify, checkOverlap, setView }) {
            const [data, setData] = useState({ name: '', email: '', id: '', date: '', time: '', dur: '1', purp: '', pax: 1, pin: '' });
            const [loading, setLoading] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);

            const submit = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { Timestamp, collection, addDoc } = window.firebaseModules;

                if (data.name.trim().length < 3) { notify("Name must be at least 3 characters", "error"); setLoading(false); return; }
                if (!/^\d{8}$/.test(data.id)) { notify("Student ID must be exactly 8 digits", "error"); setLoading(false); return; }
                if (!/^\d{4}$/.test(data.pin)) { notify("PIN must be 4 digits", "error"); setLoading(false); return; }
                
                const start = new Date(`${data.date}T${data.time}`);
                if (start < new Date()) { notify("Cannot book in the past!", "error"); setLoading(false); return; }

                const end = new Date(start.getTime() + (data.dur * 3600000));
                if(checkOverlap(start, end)) { notify("Slot unavailable (Overlap)", "error"); setLoading(false); return; }

                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'bookings'), {
                        name: data.name, email: data.email.toLowerCase(), studentId: data.id,
                        startTime: Timestamp.fromDate(start), endTime: Timestamp.fromDate(end),
                        duration: data.dur, purpose: data.purp, pax: data.pax, pin: data.pin,
                        createdAt: Timestamp.now()
                    });
                    setShowSuccess(true);
                } catch(e) { notify("Error saving booking: " + e.message, "error"); }
                setLoading(false);
            };

            const closeSuccess = () => { setShowSuccess(false); setView('schedule'); };
            const today = new Date().toISOString().split('T')[0];

            return (
                <div className="animate-enter">
                    {showSuccess && (
                        <Modal title="Booking Confirmed!" onClose={closeSuccess} color="emerald">
                            <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 text-3xl mx-auto mb-4 shadow-inner">
                                <i className="fas fa-check"></i>
                            </div>
                            <div className="text-left bg-slate-50 p-5 rounded-2xl text-sm text-slate-600 space-y-3 mb-6 border border-slate-100">
                                <div className="flex gap-3 items-start"><i className="fas fa-broom text-indigo-500 mt-1"></i><p><strong>Cleanliness:</strong> Please ensure the room is kept clean and tidy.</p></div>
                                <div className="flex gap-3 items-start"><i className="fas fa-key text-indigo-500 mt-1"></i><p><strong>Modify:</strong> Use your PIN to reschedule or cancel later.</p></div>
                            </div>
                            <button onClick={closeSuccess} className="w-full py-3.5 bg-slate-900 text-white rounded-xl font-bold shadow-lg hover:bg-slate-800 btn-hover">Understood</button>
                        </Modal>
                    )}

                    <div className="mb-6 ml-1">
                        <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight">New Booking</h2>
                        <p className="text-slate-500 text-sm font-medium">Reserve your quiet space.</p>
                    </div>

                    <form onSubmit={submit} className="space-y-4">
                        <div className="glass-panel p-5 rounded-2xl space-y-4 hover:shadow-md transition-shadow duration-300">
                            <Input label="Full Name (Min 3 chars)" icon="fa-user"><input required className="w-full bg-transparent outline-none text-sm font-medium placeholder-slate-400" placeholder="e.g. Chris John" value={data.name} onChange={e=>setData({...data, name:e.target.value})} /></Input>
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Email" icon="fa-envelope"><input required type="email" className="w-full bg-transparent outline-none text-sm font-medium placeholder-slate-400" placeholder="chris.john@monash.edu" value={data.email} onChange={e=>setData({...data, email:e.target.value})} /></Input>
                                <Input label="Student ID (8 Digits)" icon="fa-id-card"><input required inputMode="numeric" maxLength="8" className="w-full bg-transparent outline-none text-sm font-medium placeholder-slate-400" placeholder="12345678" value={data.id} onChange={e=>setData({...data, id:e.target.value.replace(/\D/g, '')})} /></Input>
                            </div>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl space-y-4 hover:shadow-md transition-shadow duration-300">
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Date" icon="fa-calendar"><input required type="date" min={today} className="w-full bg-transparent outline-none text-sm font-bold text-slate-700" value={data.date} onChange={e=>setData({...data, date:e.target.value})} /></Input>
                                <Input label="Time" icon="fa-clock"><input required type="time" className="w-full bg-transparent outline-none text-sm font-bold text-slate-700" value={data.time} onChange={e=>setData({...data, time:e.target.value})} /></Input>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Duration" icon="fa-hourglass"><select className="w-full bg-transparent outline-none text-sm font-bold text-slate-700 cursor-pointer" value={data.dur} onChange={e=>setData({...data, dur:e.target.value})}>{[0.5, 1, 1.5, 2, 3, 4].map(h => <option key={h} value={h}>{h} Hour{h>1?'s':''}</option>)}</select></Input>
                                <Input label="Group Size" icon="fa-users"><input required type="number" min="1" max="8" className="w-full bg-transparent outline-none text-sm font-bold text-slate-700" value={data.pax} onChange={e=>setData({...data, pax:e.target.value})} /></Input>
                            </div>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl space-y-4 hover:shadow-md transition-shadow duration-300">
                            <Input label="Purpose" icon="fa-comment-alt"><textarea required rows="2" className="w-full bg-transparent outline-none text-sm font-medium placeholder-slate-400 resize-none" placeholder="e.g. Thesis writing..." value={data.purp} onChange={e=>setData({...data, purp:e.target.value})}></textarea></Input>
                            <div className="bg-indigo-50/80 border border-indigo-100 p-3 rounded-xl flex items-center gap-3">
                                <div className="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-indigo-500 shadow-sm shrink-0"><i className="fas fa-lock"></i></div>
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold text-indigo-900 uppercase tracking-wide">Set Booking PIN</label>
                                    <input required type="text" maxLength="4" inputMode="numeric" placeholder="0000" className="w-full bg-transparent border-b border-indigo-200 outline-none text-lg font-bold tracking-[0.5em] text-indigo-700 focus:border-indigo-500 placeholder-indigo-200/50" value={data.pin} onChange={e=>setData({...data, pin:e.target.value.replace(/\D/g, '')})} />
                                </div>
                            </div>
                        </div>
                        <button disabled={loading} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-lg shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 btn-hover transition-all disabled:opacity-70 disabled:cursor-not-allowed">{loading ? 'Processing...' : 'Confirm Booking'}</button>
                    </form>
                </div>
            );
        }

        function ScheduleView({ bookings, db, appId, notify, checkOverlap }) {
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const filtered = bookings.filter(b => b.startTime.toDate().toISOString().startsWith(date));

            return (
                <div className="animate-enter">
                    <div className="glass-panel p-4 rounded-2xl flex items-center gap-4 mb-4">
                        <div className="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 text-xl shadow-inner"><i className="fas fa-calendar-check"></i></div>
                        <div className="flex-1">
                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Select Date</label>
                            <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full bg-transparent font-bold text-lg text-slate-800 outline-none cursor-pointer" />
                        </div>
                    </div>
                    <div className="space-y-4 relative pl-4 border-l-2 border-slate-200 ml-4 pb-8">
                        {filtered.length === 0 ? <div className="bg-white/50 p-8 rounded-2xl border-2 border-dashed border-slate-200 text-center text-slate-400 ml-4 font-medium">No bookings for this day.</div> : 
                            filtered.map((b, i) => (
                                <div key={b.id} style={{animationDelay: `${i * 100}ms`}} className="animate-enter">
                                    <ScheduleItem booking={b} db={db} appId={appId} notify={notify} checkOverlap={checkOverlap} />
                                </div>
                            ))
                        }
                    </div>
                </div>
            );
        }

        function ScheduleItem({ booking, db, appId, notify, checkOverlap }) {
            const [mode, setMode] = useState('view');
            const [pin, setPin] = useState('');
            const [editData, setEditData] = useState({ date: '', time: '', dur: '' });
            const [confirmAction, setConfirmAction] = useState(null); 

            useEffect(() => {
                if(booking) {
                    const d = booking.startTime.toDate();
                    setEditData({
                        date: d.toISOString().split('T')[0],
                        time: d.toLocaleTimeString([], {hourCycle:'h23', hour:'2-digit', minute:'2-digit'}),
                        dur: booking.duration
                    });
                }
            }, [booking]);

            const verify = (e) => { e.preventDefault(); if(pin === booking.pin) setMode('edit'); else { notify("Incorrect PIN", "error"); setPin(''); } };

            const handleUpdate = async () => {
                const start = new Date(`${editData.date}T${editData.time}`);
                if (start < new Date()) { notify("Cannot move to past!", "error"); return; }
                const end = new Date(start.getTime() + (editData.dur * 3600000));
                if(checkOverlap(start, end, booking.id)) { notify("Slot overlap!", "error"); return; }
                
                try {
                    const { updateDoc, doc, Timestamp } = window.firebaseModules;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bookings', booking.id), {
                        startTime: Timestamp.fromDate(start), endTime: Timestamp.fromDate(end), duration: editData.dur
                    });
                    notify("Updated!"); setMode('view'); setConfirmAction(null);
                } catch(e) { notify("Error", "error"); }
            };

            const handleDelete = async () => {
                try {
                    const { deleteDoc, doc } = window.firebaseModules;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bookings', booking.id));
                    notify("Cancelled");
                } catch(e) { notify("Error", "error"); }
            };

            return (
                <div className="relative ml-4">
                    <div className="absolute -left-[29px] top-4 w-5 h-5 bg-white border-4 border-indigo-400 rounded-full z-10 shadow-sm"></div>
                    <div className={`glass-panel p-4 rounded-2xl transition-all duration-300 ${mode !== 'view' ? 'ring-2 ring-indigo-400 bg-white scale-[1.02] shadow-lg' : 'hover:scale-[1.01] hover:shadow-md'}`}>
                        
                        {confirmAction === 'reschedule' && (
                            <Modal title="Confirm Changes?" onClose={()=>setConfirmAction(null)} color="indigo">
                                <p className="text-slate-600 mb-6 text-sm">Reschedule to <strong>{editData.date} at {editData.time}</strong>?</p>
                                <div className="flex gap-3">
                                    <button onClick={()=>setConfirmAction(null)} className="flex-1 py-2 text-slate-500 hover:bg-slate-100 rounded-xl font-bold">No</button>
                                    <button onClick={handleUpdate} className="flex-1 py-2 bg-indigo-600 text-white rounded-xl font-bold btn-hover">Yes, Update</button>
                                </div>
                            </Modal>
                        )}

                        {confirmAction === 'delete' && (
                            <Modal title="Cancel Booking?" onClose={()=>setConfirmAction(null)} color="red">
                                <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-red-500 text-xl mx-auto mb-4"><i className="fas fa-trash"></i></div>
                                <p className="text-slate-600 mb-6 text-sm text-center">This action cannot be undone.</p>
                                <div className="flex gap-3">
                                    <button onClick={()=>setConfirmAction(null)} className="flex-1 py-2 text-slate-500 hover:bg-slate-100 rounded-xl font-bold">Back</button>
                                    <button onClick={handleDelete} className="flex-1 py-2 bg-red-500 text-white rounded-xl font-bold btn-hover">Confirm Cancel</button>
                                </div>
                            </Modal>
                        )}

                        {mode === 'view' && (
                            <div className="flex justify-between items-start">
                                <div>
                                    <div className="font-extrabold text-slate-800 text-lg tracking-tight">{booking.startTime.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                    <div className="text-[10px] font-bold text-indigo-500 uppercase tracking-wider mb-1">To {booking.endTime.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                    <div className="text-sm text-slate-600 flex items-center gap-2 mb-1 font-medium"><i className="fas fa-user text-slate-400 text-xs"></i> {booking.name}</div>
                                </div>
                                <button onClick={()=>setMode('unlock')} className="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition btn-hover">Manage</button>
                            </div>
                        )}
                        {mode === 'unlock' && (
                            <form onSubmit={verify} className="flex gap-2 items-center animate-enter">
                                <input autoFocus type="password" maxLength="4" className="w-24 bg-slate-50 border border-slate-200 rounded-xl p-2 text-center text-sm font-bold outline-none ring-1 ring-transparent focus:ring-indigo-500 transition-all placeholder-slate-300" value={pin} onChange={e=>setPin(e.target.value)} placeholder="Enter PIN" />
                                <button className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold btn-hover">Verify</button>
                                <button type="button" onClick={()=>{setMode('view'); setPin('')}} className="text-xs text-slate-400 hover:text-slate-600 px-2 font-bold"><i className="fas fa-times text-lg"></i></button>
                            </form>
                        )}
                        {mode === 'edit' && (
                            <div className="space-y-3 animate-enter">
                                <div className="flex justify-between items-center border-b border-slate-100 pb-2 mb-3">
                                    <h3 className="font-bold text-indigo-700 text-xs uppercase tracking-wide">Edit Slot</h3>
                                    <button onClick={()=>setMode('view')} className="text-slate-400 hover:text-slate-600"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="date" className="bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs font-bold outline-none focus:border-indigo-500" value={editData.date} onChange={e=>setEditData({...editData, date:e.target.value})} />
                                    <input type="time" className="bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs font-bold outline-none focus:border-indigo-500" value={editData.time} onChange={e=>setEditData({...editData, time:e.target.value})} />
                                </div>
                                <div className="flex gap-2 pt-1">
                                    <button onClick={()=>setConfirmAction('reschedule')} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-xs font-bold btn-hover shadow-sm">Save Changes</button>
                                    <button onClick={()=>setConfirmAction('delete')} className="flex-1 bg-white text-red-500 border border-red-100 py-2 rounded-lg text-xs font-bold hover:bg-red-50 transition">Cancel Booking</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- NEW CREATIVE ADMIN ANALYTICS ---
        function AdminAnalytics({ bookings, db, appId, notify }) {
            const [tab, setTab] = useState('insights');
            const [filter, setFilter] = useState('all'); 
            const [customDate, setCustomDate] = useState({ start: '', end: '' });
            const [sortConfig, setSortConfig] = useState({ key: 'time', direction: 'desc' });

            // --- Filter Logic ---
            const filteredBookings = useMemo(() => {
                const now = new Date();
                return bookings.filter(b => {
                    const date = b.startTime.toDate();
                    
                    if(filter === 'custom') {
                        if(!customDate.start || !customDate.end) return true;
                        const start = new Date(customDate.start);
                        const end = new Date(customDate.end);
                        end.setHours(23, 59, 59);
                        return date >= start && date <= end;
                    }

                    if(filter === 'all') return true;
                    
                    const diffTime = Math.abs(now - date);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                    if(filter === 'week') return diffDays <= 7;
                    if(filter === 'month') return diffDays <= 30;
                    return true;
                });
            }, [bookings, filter, customDate]);

            // --- Sort Logic ---
            const sortedData = useMemo(() => {
                let sortableItems = [...filteredBookings];
                if (sortConfig.key !== null) {
                    sortableItems.sort((a, b) => {
                        let aVal, bVal;
                        switch(sortConfig.key) {
                            case 'user': aVal = a.name.toLowerCase(); bVal = b.name.toLowerCase(); break;
                            case 'time': aVal = a.startTime.seconds; bVal = b.startTime.seconds; break;
                            case 'details': aVal = parseFloat(a.duration); bVal = parseFloat(b.duration); break;
                            case 'purpose': aVal = a.purpose.toLowerCase(); bVal = b.purpose.toLowerCase(); break;
                            default: return 0;
                        }
                        if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return sortableItems;
            }, [filteredBookings, sortConfig]);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const downloadCSV = () => {
                const headers = ["ID,Name,Email,Student ID,Date,Start,End,Duration,Pax,PIN,Purpose,Created"];
                const rows = sortedData.map(b => [
                    b.id, `"${b.name}"`, b.email, b.studentId,
                    b.startTime.toDate().toLocaleDateString(), b.startTime.toDate().toLocaleTimeString(), b.endTime.toDate().toLocaleTimeString(),
                    b.duration, b.pax, b.pin, `"${b.purpose}"`, b.createdAt ? b.createdAt.toDate().toISOString() : '-'
                ].join(","));
                const link = document.createElement("a");
                link.href = "data:text/csv;charset=utf-8," + encodeURI([headers, ...rows].join("\n"));
                link.download = `phd_pod_data_${filter}.csv`;
                link.click();
            };

            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const dayCounts = [0,0,0,0,0,0,0];
            const userStats = {}; 
            const timeOfDay = { Morning: 0, Afternoon: 0, Evening: 0 };
            let totalHours = 0;

            filteredBookings.forEach(b => {
                const date = b.startTime.toDate();
                dayCounts[date.getDay()]++; 
                
                if (!userStats[b.studentId]) userStats[b.studentId] = { count: 0, name: b.name, id: b.studentId };
                userStats[b.studentId].count++;
                
                totalHours += parseFloat(b.duration);
                const h = date.getHours();
                if(h < 12) timeOfDay.Morning++;
                else if(h < 17) timeOfDay.Afternoon++;
                else timeOfDay.Evening++;
            });

            const rankedUsers = Object.values(userStats).sort((a,b) => b.count - a.count);
            const maxDayVal = Math.max(...dayCounts) || 1; 

            const del = async (id) => {
                if(confirm("Delete this record?")) {
                    const { deleteDoc, doc } = window.firebaseModules;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bookings', id));
                    notify("Deleted");
                }
            };

            return (
                <div className="space-y-6 animate-enter">
                    <div className="flex justify-between items-center">
                        <h2 className="text-xl font-bold text-slate-800">Admin Intelligence</h2>
                        <button onClick={downloadCSV} className="bg-slate-800 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-slate-900 shadow-lg btn-hover"><i className="fas fa-download"></i> CSV</button>
                    </div>

                    <div className="flex flex-col gap-2">
                        <div className="flex gap-2 bg-white p-1 rounded-xl border border-slate-100 shadow-sm">
                            {['week', 'month', 'all', 'custom'].map(f => (
                                <button key={f} onClick={()=>setFilter(f)} className={`flex-1 py-2 text-xs font-bold rounded-lg transition capitalize ${filter===f ? 'bg-indigo-50 text-indigo-600' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    {f === 'all' ? 'All Time' : f === 'week' ? 'Last 7 Days' : f === 'month' ? 'Last 30 Days' : 'Custom'}
                                </button>
                            ))}
                        </div>
                        {filter === 'custom' && (
                            <div className="flex gap-2 animate-enter">
                                <input type="date" className="flex-1 p-2 rounded-lg border border-slate-200 text-xs font-bold text-slate-600 outline-none focus:border-indigo-500" value={customDate.start} onChange={e=>setCustomDate({...customDate, start:e.target.value})} />
                                <span className="self-center text-slate-400">-</span>
                                <input type="date" className="flex-1 p-2 rounded-lg border border-slate-200 text-xs font-bold text-slate-600 outline-none focus:border-indigo-500" value={customDate.end} onChange={e=>setCustomDate({...customDate, end:e.target.value})} />
                            </div>
                        )}
                    </div>

                    <div className="flex bg-slate-100 p-1 rounded-xl">
                        <button onClick={()=>setTab('insights')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition ${tab==='insights'?'bg-white shadow text-indigo-600':'text-slate-500'}`}>Insights</button>
                        <button onClick={()=>setTab('data')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition ${tab==='data'?'bg-white shadow text-indigo-600':'text-slate-500'}`}>Raw Data</button>
                    </div>

                    {tab === 'insights' ? (
                        <div className="space-y-4 animate-enter">
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-gradient-to-br from-indigo-500 to-indigo-700 text-white p-4 rounded-2xl shadow-lg shadow-indigo-200">
                                    <p className="text-xs font-bold opacity-70 uppercase tracking-wide">Total Bookings</p>
                                    <p className="text-3xl font-extrabold mt-1">{filteredBookings.length}</p>
                                </div>
                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-wide">Hours Utilized</p>
                                    <p className="text-3xl font-extrabold text-slate-800 mt-1">{totalHours}h</p>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <h3 className="text-sm font-bold text-slate-700 mb-6 flex items-center gap-2"><i className="fas fa-chart-bar text-indigo-500"></i> Activity ({filter})</h3>
                                <div className="flex items-end justify-between h-32 gap-3 relative">
                                    {dayCounts.map((count, i) => (
                                        <div key={i} className="relative flex flex-col items-center flex-1 h-full justify-end group">
                                            <div className="absolute -top-8 opacity-0 group-hover:opacity-100 transition-all duration-200 bg-slate-800 text-white text-[10px] py-1 px-2 rounded shadow-lg z-10 whitespace-nowrap transform translate-y-2 group-hover:translate-y-0">
                                                {count} bookings <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-slate-800 rotate-45"></div>
                                            </div>
                                            <div className={`w-full rounded-t-md transition-all duration-700 ease-out bar-grow ${count === 0 ? 'bg-slate-100' : 'bg-gradient-to-t from-indigo-500 to-indigo-400 hover:from-indigo-600 hover:to-indigo-500'}`} style={{height: `${count === 0 ? '4px' : (count / maxDayVal) * 85}%`}}></div>
                                            <span className="text-[10px] font-bold text-slate-400 mt-3 uppercase tracking-wider">{days[i]}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                    <h3 className="text-sm font-bold text-slate-700 mb-4">Time Preference</h3>
                                    <div className="space-y-4">
                                        <div className="flex items-center text-xs font-bold text-slate-500 gap-3">
                                            <span className="w-16">Morning</span>
                                            <div className="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-amber-400 rounded-full" style={{width: `${(timeOfDay.Morning/filteredBookings.length)*100 || 0}%`, transition: 'width 1s'}}></div></div>
                                            <span className="w-6 text-right">{timeOfDay.Morning}</span>
                                        </div>
                                        <div className="flex items-center text-xs font-bold text-slate-500 gap-3">
                                            <span className="w-16">Afternoon</span>
                                            <div className="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-orange-500 rounded-full" style={{width: `${(timeOfDay.Afternoon/filteredBookings.length)*100 || 0}%`, transition: 'width 1s'}}></div></div>
                                            <span className="w-6 text-right">{timeOfDay.Afternoon}</span>
                                        </div>
                                        <div className="flex items-center text-xs font-bold text-slate-500 gap-3">
                                            <span className="w-16">Evening</span>
                                            <div className="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-indigo-900 rounded-full" style={{width: `${(timeOfDay.Evening/filteredBookings.length)*100 || 0}%`, transition: 'width 1s'}}></div></div>
                                            <span className="w-6 text-right">{timeOfDay.Evening}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-0 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-64 overflow-hidden">
                                    <div className="p-4 border-b border-slate-50 bg-white sticky top-0 z-10"><h3 className="text-sm font-bold text-slate-700">User Activity</h3></div>
                                    <div className="overflow-y-auto flex-1 p-2 custom-scrollbar">
                                        {rankedUsers.map((student, i) => (
                                            <div key={student.id} className="flex justify-between items-center text-xs p-2 hover:bg-slate-50 rounded-lg transition-colors mb-1">
                                                <div className="flex items-center gap-3">
                                                    <span className={`w-6 h-6 rounded-lg flex items-center justify-center font-bold text-[10px] ${i===0?'bg-yellow-100 text-yellow-700': i===1?'bg-slate-200 text-slate-600': i===2 ? 'bg-orange-100 text-orange-700' : 'bg-slate-50 text-slate-500'}`}>#{i+1}</span>
                                                    <div className="flex flex-col">
                                                        <span className="font-bold text-slate-800 text-sm">{student.name}</span>
                                                        <span className="text-[10px] text-slate-400 font-mono tracking-wide">{student.id}</span>
                                                    </div>
                                                </div>
                                                <span className="font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">{student.count}x</span>
                                            </div>
                                        ))}
                                        {rankedUsers.length === 0 && <div className="flex flex-col items-center justify-center h-full text-slate-300 pb-8"><i className="fas fa-users-slash text-2xl mb-2"></i><p className="text-xs">No active users found.</p></div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-enter">
                            <div className="max-h-[60vh] overflow-y-auto custom-scrollbar">
                                <table className="w-full text-left text-xs">
                                    <thead className="bg-slate-50 font-bold text-slate-500 uppercase sticky top-0 shadow-sm z-10">
                                        <tr>
                                            <th className="p-4 cursor-pointer hover:bg-slate-100 transition duration-200" onClick={()=>handleSort('user')}>User {sortConfig.key === 'user' && <i className={`fas fa-sort-${sortConfig.direction === 'asc' ? 'up' : 'down'} ml-1 text-indigo-500`}></i>}</th>
                                            <th className="p-4 cursor-pointer hover:bg-slate-100 transition duration-200" onClick={()=>handleSort('time')}>Time {sortConfig.key === 'time' && <i className={`fas fa-sort-${sortConfig.direction === 'asc' ? 'up' : 'down'} ml-1 text-indigo-500`}></i>}</th>
                                            <th className="p-4 cursor-pointer hover:bg-slate-100 transition duration-200" onClick={()=>handleSort('details')}>Details {sortConfig.key === 'details' && <i className={`fas fa-sort-${sortConfig.direction === 'asc' ? 'up' : 'down'} ml-1 text-indigo-500`}></i>}</th>
                                            <th className="p-4 cursor-pointer hover:bg-slate-100 transition duration-200 hidden md:table-cell" onClick={()=>handleSort('purpose')}>Purpose {sortConfig.key === 'purpose' && <i className={`fas fa-sort-${sortConfig.direction === 'asc' ? 'up' : 'down'} ml-1 text-indigo-500`}></i>}</th>
                                            <th className="p-4 text-center">Act</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {sortedData.map(b => (
                                            <tr key={b.id} className="hover:bg-indigo-50/30 transition-colors group">
                                                <td className="p-4 font-bold text-slate-700 align-top">
                                                    {b.name}<div className="font-medium text-slate-400 font-mono mt-1 bg-slate-100 w-fit px-1.5 rounded text-[10px]">{b.studentId}</div>
                                                </td>
                                                <td className="p-4 align-top">
                                                    <div className="font-semibold text-slate-700">{b.startTime.toDate().toLocaleDateString(undefined, {month:'short', day:'numeric'})}</div>
                                                    <div className="text-indigo-600 font-bold mt-1 whitespace-nowrap bg-indigo-50 px-2 py-0.5 rounded w-fit">
                                                        {b.startTime.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} - {b.endTime.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
                                                    </div>
                                                </td>
                                                <td className="p-4 align-top text-slate-500">
                                                    <div className="flex flex-col gap-1.5">
                                                        <div className="flex gap-2">
                                                            <span className="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold border border-slate-200"><i className="fas fa-clock mr-1 text-slate-400"></i>{b.duration}h</span>
                                                            <span className="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold border border-slate-200"><i className="fas fa-users mr-1 text-slate-400"></i>{b.pax}</span>
                                                        </div>
                                                        <span className="font-mono text-[10px] text-slate-400 flex items-center"><i className="fas fa-key mr-1.5"></i>{b.pin}</span>
                                                    </div>
                                                </td>
                                                <td className="p-4 hidden md:table-cell align-top text-slate-500 italic max-w-xs">
                                                    <div className="truncate opacity-70 group-hover:opacity-100 transition-opacity">"{b.purpose}"</div>
                                                </td>
                                                <td className="p-4 text-center align-top">
                                                    <button onClick={()=>del(b.id)} className="w-8 h-8 rounded-lg flex items-center justify-center text-red-400 hover:text-red-600 hover:bg-red-50 transition border border-transparent hover:border-red-100">
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                        {sortedData.length === 0 && (
                                            <tr><td colSpan="5" className="p-12 text-center text-slate-400 italic">No bookings match the filter.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Input({ label, icon, children }) {
            return (
                <div className="relative group">
                    <div className="absolute top-3 left-3 text-slate-400 group-focus-within:text-indigo-500 transition-colors"><i className={`fas ${icon}`}></i></div>
                    <div className="bg-white border border-slate-200 rounded-xl p-2 pl-10 focus-within:bg-white focus-within:border-indigo-500 focus-within:ring-4 focus-within:ring-indigo-500/10 transition-all shadow-sm">
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">{label}</label>
                        {children}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
